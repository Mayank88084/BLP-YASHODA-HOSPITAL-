<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact and Appointment | BLP YASHODA Hospital</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="site-header">
<h1>Contact BLP YASHODA Hospital</h1>
</header>

<main>

<section>

<h2>Book Appointment</h2>

<form id="appointmentForm">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Department</label>
<select name="department" required>
<option value="">Select Department</option>
<option>General Consultation</option>
<option>Diabetes Care</option>
<option>Neuro Spine and Joint Care</option>
<option>Emergency Support</option>
</select>

<label>Preferred Date</label>
<input type="date" name="date" required>

<label>Message</label>
<textarea name="message"></textarea>

<button type="submit">Submit Appointment Request</button>

<p id="formMessage"></p>

</form>

</section>


<section>

<h2>Hospital Contact Details</h2>

<p>Phone: +91 8808456820</p>
<p>Email: pandeymayank9918@gmail.com</p>
<p>Address: Gonda, Uttar Pradesh</p>

</section>


<section>

<h2>Hospital Location</h2>

<iframe
src="https://www.google.com/maps?q=Gonda%20Uttar%20Pradesh&output=embed"
width="100%"
height="300"
style="border:0;">
</iframe>

</section>

</main>

<footer>
<p>© 2026 BLP YASHODA Hospital and Research Centre</p>
</footer>


<!-- EmailJS Script -->

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

window.onload = function(){

emailjs.init("_wCkOBOWkRnWlvU8B");

document.getElementById("appointmentForm").addEventListener("submit", function(event){

event.preventDefault();

emailjs.sendForm(
"service_rtsqa4w",
"template_1h5o9nv",
this
).then(function(){

document.getElementById("formMessage").innerText =
"Appointment request sent successfully.";

}, function(error){

document.getElementById("formMessage").innerText =
"Failed to send appointment request.";

});

});

};

</script>

</body>
</html>
